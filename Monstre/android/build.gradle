buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects { project ->
    def configureAndroid = {
        if (project.hasProperty("android")) {
            project.android {
                compileSdkVersion rootProject.ext.compileSdkVersion
                buildToolsVersion rootProject.ext.buildToolsVersion
            }
        }
    }

    if (project.state.executed) {
        configureAndroid()
    } else {
        project.afterEvaluate {
            configureAndroid()
        }
    }

    // Force consistent Kotlin stdlib version across all subprojects
    project.configurations.configureEach { config ->
        config.resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin'
                && details.requested.name.startsWith('kotlin-stdlib')) {
                details.useVersion rootProject.ext.kotlinVersion
            }
        }
    }

    // Force Kotlin compilation tasks to target JVM 17 to match Java 17
    project.tasks.configureEach { task ->
        if (task.class.name.startsWith("org.jetbrains.kotlin.gradle.tasks.KotlinCompile")) {
            task.kotlinOptions.jvmTarget = "17"
        }
    }
}
